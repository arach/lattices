  <rect x="203" y="88" width="107" height="107" rx="10" fill="rgba(255,255,255,0.18)"/>
  <rect x="318" y="88" width="107" height="107" rx="10" fill="rgba(255,255,255,0.18)"/>

  <!-- Row 2 -->
  <rect x="88" y="203" width="107" height="107" rx="10" fill="#f2f2f2"/>
  <rect x="203" y="203" width="107" height="107" rx="10" fill="rgba(255,255,255,0.18)"/>
  <rect x="318" y="203" width="107" height="107" rx="10" fill="rgba(255,255,255,0.18)"/>

  <!-- Row 3 -->
  <rect x="88" y="318" width="107" height="107" rx="10" fill="#f2f2f2"/>
  <rect x="203" y="318" width="107" height="107" rx="10" fill="#f2f2f2"/>
