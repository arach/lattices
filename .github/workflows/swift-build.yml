name: Swift Build

on:
  pull_request:
    paths:
      - 'apps/mac/**'
      - '.github/workflows/swift-build.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/mac/**'
      - '.github/workflows/swift-build.yml'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build (debug)
        working-directory: apps/mac
        run: swift build -c debug
