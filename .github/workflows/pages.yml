name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths: [apps/site/**, apps/docs-site/**, docs/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      # Landing page (apps/site/)
      - run: bun install --frozen-lockfile
        working-directory: apps/site

      - run: bun run build
        working-directory: apps/site

      # Docs site (apps/docs-site/) → apps/site/dist/docs/
      - run: bun install --frozen-lockfile
        working-directory: apps/docs-site

      - run: bun run build
        working-directory: apps/docs-site

      - run: mkdir -p apps/site/dist/docs && cp -r apps/docs-site/dist/* apps/site/dist/docs/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
