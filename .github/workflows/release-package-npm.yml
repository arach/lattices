name: Release Package npm

on:
  push:
    tags:
      - 'npm-v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm instead of running a dry run'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: macos-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    env:
      # `npm publish` runs prepack (bin/lattices-build package), which builds
      # the Swift app — so this job needs the same HudsonKit git setup as the
      # macOS release: resolve hudson + its vox/swift dep over git, with voice.
      HUDSON_READ_TOKEN: ${{ secrets.HUDSON_READ_TOKEN }}
      LATTICES_HUDSON_SOURCE: git
      HUDSON_VOX_SOURCE: git
      HUDSONKIT_WITH_VOICE: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        shell: bash
        run: |
          set -euo pipefail
          # Package.swift requires swift-tools 6.2 (Xcode 26); runner defaults to 16.4.
          xcode="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)"
          if [[ -z "$xcode" ]]; then
            echo "No Xcode 26 found on this runner:" >&2
            ls -d /Applications/Xcode_*.app >&2
            exit 1
          fi
          echo "Using $xcode"
          sudo xcode-select -s "$xcode/Contents/Developer"

      - name: Configure private HudsonKit access
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${HUDSON_READ_TOKEN:-}" ]]; then
            echo "::error::HUDSON_READ_TOKEN secret is not set. Add a read-only PAT for arach/hudson (+arach/vox)." >&2
            exit 1
          fi
          git config --global url."https://x-access-token:${HUDSON_READ_TOKEN}@github.com/".insteadOf "git@github.com:"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Package dry run
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.publish }}
        run: npm publish --dry-run --access public

      - name: Verify npm credentials
        if: ${{ github.event_name == 'push' || inputs.publish }}
        run: |
          set -euo pipefail
          user="$(npm whoami)"
          expected="${NPM_EXPECTED_USER:-arach}"
          if [ "$user" != "$expected" ]; then
            echo "::error::NPM_TOKEN authenticates as '$user', expected '$expected'. Set NPM_EXPECTED_USER if a different npm maintainer should publish."
            exit 1
          fi
          echo "NPM_TOKEN authenticates as $user."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_EXPECTED_USER: ${{ vars.NPM_EXPECTED_USER }}

      - name: Publish to npm
        if: ${{ github.event_name == 'push' || inputs.publish }}
        run: |
          set -euo pipefail
          # Primary package (@arach/lattices) — updates the public npm page.
          npm publish --provenance --access public
          # Back-compat alias for existing @lattices/cli installs/imports.
          npm pkg set name=@lattices/cli
          npm publish --provenance --access public
          npm pkg set name=@arach/lattices
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
