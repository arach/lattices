  <rect x="80" y="51" width="26" height="26" rx="3" fill="rgba(255,255,255,0.18)"/>

  <rect x="22" y="80" width="26" height="26" rx="3" fill="#f2f2f2"/>
  <rect x="51" y="80" width="26" height="26" rx="3" fill="#f2f2f2"/>
