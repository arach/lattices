<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#111113"/>

  <!-- 3 dark panes with a bright green L channel between them -->
  <!-- Left pane (full height) -->
  <rect x="72" y="72" width="129" height="368" rx="14" fill="#1c1c1e"/>

  <!-- Top-right pane -->
  <rect x="215" y="72" width="225" height="221" rx="14" fill="#1c1c1e"/>

  <!-- Bottom pane (full width, overlaps left at bottom-left) -->
  <rect x="72" y="307" width="368" height="133" rx="14" fill="#1c1c1e"/>

  <!-- L channel: green accent in the gap -->
  <!-- Vertical arm -->
  <rect x="201" y="72" width="14" height="221" rx="2" fill="#33c773" opacity="0.3"/>
  <!-- Corner -->
  <rect x="201" y="293" width="14" height="14" rx="2" fill="#33c773" opacity="0.3"/>
  <!-- Horizontal arm -->
  <rect x="215" y="293" width="225" height="14" rx="2" fill="#33c773" opacity="0.3"/>
</svg>
