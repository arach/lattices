<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#111113"/>

  <!-- 4 panes in a 2x2 grid — 3 bright (L shape), 1 dim -->
  <!-- Top-left (L arm) -->
  <rect x="80" y="80" width="168" height="168" rx="16" fill="#ffffff"/>

  <!-- Top-right (dim — the void) -->
  <rect x="264" y="80" width="168" height="168" rx="16" fill="rgba(255,255,255,0.07)"/>

  <!-- Bottom-left (L corner) -->
  <rect x="80" y="264" width="168" height="168" rx="16" fill="#ffffff"/>

  <!-- Bottom-right (L arm) -->
  <rect x="264" y="264" width="168" height="168" rx="16" fill="#ffffff"/>
</svg>
