name: Release Candidate

on:
  push:
    tags:
      - 'candidate-v*'
  workflow_dispatch:

jobs:
  all:
    name: Package and app checks
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version
          swift --version
          xcodebuild -version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck package sources
        run: bun run check:types

      - name: Package npm dry run
        run: npm publish --dry-run --access public

      - name: Build unsigned macOS DMG
        run: LATTICES_SKIP_SIGN=1 LATTICES_SKIP_NOTARIZE=1 bash tools/release/build-dmg.sh

      - name: Build iOS simulator app
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project apps/ios/LatticesCompanion.xcodeproj \
            -scheme LatticesCompanion \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/lattices-ios-derived-data" \
            CODE_SIGNING_ALLOWED=NO \
            build
